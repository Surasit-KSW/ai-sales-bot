# ==============================================================================
#  SHOP PROFILE — กรอกข้อมูลร้านของคุณในไฟล์นี้
#  AI จะใช้ข้อมูลนี้ในการตอบลูกค้าทุกครั้ง
#  วิธีใช้: แก้ไขค่าหลัง ":" ในแต่ละช่อง แล้วบันทึกไฟล์ จากนั้น python main.py
# ==============================================================================

# ------------------------------------------------------------------------------
# ข้อมูลพื้นฐานของร้าน
# ------------------------------------------------------------------------------
shop:
  name: "ร้านมายชอป"                          # ชื่อร้านค้าของคุณ
  tagline: "แฟชั่นสตรีราคาเป็นกันเอง"          # สโลแกนหรือคำอธิบายสั้นๆ
  platform: "Facebook / TikTok Shop"           # ช่องทางขายหลัก

# ------------------------------------------------------------------------------
# ข้อมูลสินค้า
# ------------------------------------------------------------------------------
products:
  category: "เสื้อผ้าแฟชั่นสตรี"               # ประเภทสินค้าหลัก
  description: >
    เสื้อผ้าแฟชั่นสตรี ได้แก่ เดรส เสื้อครอป
    กางเกงขายาว และชุดเซ็ต สไตล์เกาหลี-ญี่ปุ่น
  price_range: "เริ่มต้น 199 บาท สูงสุด 1,290 บาท"
  highlights:                                  # จุดเด่นของสินค้า (ใส่ได้หลายข้อ)
    - "ผ้านุ่มใส่สบาย ระบายอากาศได้ดี"
    - "มีให้เลือก 5 สี และ 4 ไซส์ (S/M/L/XL)"
    - "ตัดเย็บประณีต รับประกันคุณภาพ"
  promotions: "ซื้อ 2 ชิ้นลด 10% | ซื้อ 3 ชิ้นลด 15% | ฟรีของแถมทุกออเดอร์"

# ------------------------------------------------------------------------------
# ช่องทางติดต่อและสั่งซื้อ
# ------------------------------------------------------------------------------
contact:
  order_channel: "ทักมาทาง Inbox Facebook หรือ LINE"
  line_id: "@myshop"                           # LINE OA ID ของร้าน
  facebook: "fb.com/myshop"                   # Facebook Page
  response_hours: "ทุกวัน 09:00 - 21:00 น."   # เวลาทำการ

# ------------------------------------------------------------------------------
# ข้อมูลการจัดส่ง
# ------------------------------------------------------------------------------
shipping:
  nationwide: true                             # จัดส่งทั่วประเทศ (true/false)
  fee: "50 บาท"                               # ค่าจัดส่งมาตรฐาน
  free_shipping_threshold: "ฟรีค่าส่งเมื่อซื้อครบ 500 บาท"
  duration: "2-3 วันทำการ (Kerry / Flash)"
  cod_available: true                          # ปลายทางได้ (true/false)

# ------------------------------------------------------------------------------
# นโยบายร้าน
# ------------------------------------------------------------------------------
policy:
  return_policy: "เปลี่ยนสินค้าได้ภายใน 7 วัน หากสินค้าชำรุดจากการผลิต"
  warranty: "รับประกันความพึงพอใจ 100%"
  payment: "โอนจ่าย / QR Code / บัตรเครดิต / ปลายทาง"

# ------------------------------------------------------------------------------
# สไตล์การตอบของ AI
# ------------------------------------------------------------------------------
reply_style:
  tone: "เป็นกันเอง"        # เลือกได้: "สุภาพมาก" / "เป็นกันเอง" / "ทางการ"
  closing_word: "ค่ะ"       # คำลงท้าย: "ครับ" หรือ "ค่ะ"
  use_emoji: true            # ใช้ emoji ในการตอบ (true/false)
  signature: ""              # ลายเซ็นท้ายข้อความ เช่น "~ ทีมงานมายชอป" (ใส่ "" เพื่อไม่ใช้)
