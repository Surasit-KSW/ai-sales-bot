# ------------------------------------------------------------------------------
# คำถามที่พบบ่อย (FAQ)
# ------------------------------------------------------------------------------
faq:
  - question: "สินค้ามีไซส์อะไรบ้าง"
    answer: "มี S, M, L, XL และบางรุ่นมี XXL ดูตาราง size guide ในรูปสินค้าหรือทักถามได้เลยค่ะ"
  - question: "สั่งซื้อยังไง"
    answer: "ทักมาใน Inbox Facebook หรือ LINE @myshop แจ้งชื่อสินค้า สี ไซส์ และที่อยู่จัดส่ง แล้วโอนเงินได้เลยค่ะ"
  - question: "ค่าส่งเท่าไหร่"
    answer: "ค่าส่ง 50 บาท ฟรีค่าส่งเมื่อซื้อครบ 500 บาทค่ะ"
  - question: "ส่งนานแค่ไหน"
    answer: "ส่งภายใน 1-2 วันทำการหลังโอนเงิน ถึงมือลูกค้าใน 1-3 วันทำการค่ะ"
  - question: "รับปลายทางได้ไหม"
    answer: "รับปลายทาง (COD) ได้ค่ะ แต่ต้องแจ้งล่วงหน้าตอนสั่งซื้อ"
  - question: "คืน/เปลี่ยนสินค้าได้ไหม"
    answer: "คืนสินค้าได้ภายใน 7 วัน หากชำรุดจากการผลิต เปลี่ยนไซส์ได้ฟรี 1 ครั้งภายใน 14 วันค่ะ"

# ------------------------------------------------------------------------------
# ช่องทางติดต่อ
# ------------------------------------------------------------------------------
contact:
  line_id: "@myshop"
  facebook: "fb.com/myshop"
  phone: "082-XXX-XXXX"
  email: ""
  hours: "เปิด 09:00-21:00 ทุกวัน"
  response_time: "ตอบกลับภายใน 30 นาที"
  order_channels:
    - "LINE OA"
    - "Facebook Inbox"

# ------------------------------------------------------------------------------
# สไตล์การตอบของ AI
# ------------------------------------------------------------------------------
reply_style:
  tone: "เป็นกันเอง"
  closing_word: "ค่ะ"
  use_emoji: true
  emoji_density: "medium"     # low / medium / high
  personality: >
    ใจดี กระตือรือร้น ช่วยเหลือลูกค้าอย่างจริงใจ
    อธิบายละเอียดแต่ไม่ยืดเยื้อ ไม่กดดันลูกค้า
    แต่ชวนซื้ออย่างสุภาพด้วยการนำเสนอจุดเด่นและโปรโมชั่น
  forbidden_words:
    - "ไม่ทราบ"
    - "ไม่รู้"
    - "ไม่แน่ใจ"
  always_include:
    - "LINE @myshop ทุกครั้งที่แนะนำให้ติดต่อ"

# ------------------------------------------------------------------------------
# กฎการส่งต่อให้ทีมงาน (Escalation)
# ------------------------------------------------------------------------------
escalation:
  trigger_keywords:
    - "โกง"
    - "แย่มาก"
    - "ฟ้อง"
    - "คืนเงิน"
    - "หลอก"
    - "แจ้งความ"
  action: "flag_for_human"
  human_notify: true
